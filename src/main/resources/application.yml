# 服务器配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/repair_order_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root # 你的MySQL用户名
    password: 123456 # 你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  # web连接池配置
  web:
    cors:
      allowed-origins: "*"
      allowed-methods: GET,POST,PUT,DELETE
      allowed-headers: "*"
      max-age: 3600
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQL8Dialect
    # 3.x 需显式指定数据库类型
    database: mysql
server:
  port: 8080
# 3.x 必须指定JDK版本兼容（若用JDK8需添加）
spring.main:
  allow-circular-references: true
  allow-bean-definition-overriding: true
